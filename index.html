<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/map.svg" />
    <title>Heatmap by Moeamar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
      #map {
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- Judul di kanan atas dengan mode absolute -->
    <div
      style="
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 1000;
        background: #e7bf8e;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      "
    >
      <p
        style="
          margin: 0;
          font-family: sans-serif;
          font-weight: bold;
          font-size: 14px;
          color: #333;
        "
      >
        Customer Geospatial Visualization
      </p>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script>
      async function loadHeatmap() {
        // 1. Batasi area peta agar tidak bisa digeser ke luar batas dunia
        const bounds = [
          [-90, -180],
          [90, 180],
        ];
        // Tentukan zoom awal (misalnya 5)
        const initialZoom = 5;

        // Inisialisasi peta
        const map = L.map("map", {
          minZoom: initialZoom, // Mencegah zoom out melebihi level 5
          maxZoom: initialZoom + 7,
          maxBounds: bounds,
          maxBoundsViscosity: 1.0, // Membuat peta memantul kembali jika ditarik ke luar
        }).setView([-2.5489, 118.0149], 5);

        // Tambahkan tile layer untuk background peta
        // Tambahkan opsi noWrap pada tileLayer
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          noWrap: true, // Mencegah layer mengulang secara horizontal
          bounds: bounds, // Memastikan tile hanya dimuat dalam area tersebut
        }).addTo(map);

        // Ambil data dari API
        const URL_API = "content.json";
        try {
          const response = await fetch(URL_API);
          if (!response.ok) {
            throw new Error("Network response was not ok");
          }
          const data = await response.json();

          // Konversi data ke format heatmap
          const heatData = data.map((point) => [
            point.lat || 0,
            point.lon || 0,
            point.count || 0,
          ]);

          // Marked
          //
          for (let pin of data) {
            L.marker([pin.lat || 0, pin.lon || 0])
              .bindPopup("Jumlah : " + pin.count)
              .addTo(map);
          }

          // Tambahkan heatmap ke peta
          L.heatLayer(heatData, {
            radius: 10, // Ukuran radius heatmap
            blur: 5, // Efek blur untuk heatmap
            maxZoom: 5, // Zoom maksimum untuk visualisasi heatmap
          }).addTo(map);
        } catch (error) {
          console.error("Error fetching data:", error);
        }
      }

      // Panggil fungsi untuk memuat heatmap
      loadHeatmap();
    </script>
  </body>
</html>
